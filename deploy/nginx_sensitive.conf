server {
    listen 8001;
    server_name _;

    # Basic Auth — 共享密码，所有内部用户使用同一账号
    auth_basic "Sensitive Word Tool";
    auth_basic_user_file /etc/nginx/.htpasswd_sensitive;

    # 突发请求频率限制（nginx 层粗过滤，精细熔断由应用层完成）
    limit_req zone=sw_limit burst=10 nodelay;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}
